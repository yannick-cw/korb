  /products:
    get:
      summary: GET products
      description: |
        query is required (NonNull String! in GraphQL). Use query=* as wildcard for category browsing.
        Filters must be passed as a single URL-encoded `filters` param, NOT as separate query params.
        Example: filters=attribute%3Dorganic%26categorySlug%3Dobst-gemuese%26serviceType%3DPICKUP%26wwIdent%3D440340
        Which decodes to: attribute=organic&categorySlug=obst-gemuese&serviceType=PICKUP&wwIdent=440340
        Both categorySlug and attribute work as real server-side filters when inside `filters`.
        Passing them as standalone query params is silently ignored.
        Without query, endpoint returns GraphQL validation error. For category browsing, use query=* with filters.
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      products:
                        type: object
                        properties:
                          pagination:
                            type: object
                            properties:
                              objectsPerPage:
                                type: number
                              currentPage:
                                type: number
                              pageCount:
                                type: number
                              objectCount:
                                type: number
                          search:
                            type: object
                            properties:
                              term:
                                type: object
                                properties:
                                  original:
                                    type: string
                                  corrected:
                                    type: object
                                    nullable: true
                          products:
                            type: array
                            items:
                              type: object
                              properties:
                                productId:
                                  type: string
                                title:
                                  type: string
                                depositLabel:
                                  type: object
                                  nullable: true
                                imageURL:
                                  type: string
                                attributes:
                                  type: object
                                  properties:
                                    isBulkyGood:
                                      type: boolean
                                    isOrganic:
                                      type: boolean
                                    isVegan:
                                      type: boolean
                                    isVegetarian:
                                      type: boolean
                                    isDairyFree:
                                      type: boolean
                                    isGlutenFree:
                                      type: boolean
                                    isBiocide:
                                      type: boolean
                                    isAgeRestricted:
                                      type: object
                                      nullable: true
                                    isRegional:
                                      type: boolean
                                    isNew:
                                      type: boolean
                                    isLowestPrice:
                                      type: boolean
                                    isTobacco:
                                      type: object
                                      nullable: true
                                orderLimit:
                                  type: number
                                categories:
                                  type: array
                                  items:
                                    type: string
                                detailsViewRequired:
                                  type: boolean
                                articleId:
                                  type: string
                                listing:
                                  type: object
                                  properties:
                                    listingId:
                                      type: string
                                    listingVersion:
                                      type: number
                                    currentRetailPrice:
                                      type: number
                                    totalRefundPrice:
                                      type: object
                                      nullable: true
                                    grammage:
                                      type: string
                                    discount:
                                      type: object
                                      nullable: true
                                    loyaltyBonus:
                                      type: object
                                      nullable: true
                                categoryDetails:
